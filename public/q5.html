<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>問5</title><link rel="stylesheet" href="style.css"></head>
<body>
  <div class="container">
    <h1>問5</h1>
    <p>問5の答えは？</p>
    <form id="quizForm">
      <input type="text" id="answer" required placeholder="キーワードを入力">
      <button type="submit">送信</button>
    </form>
    <p id="result"></p>
  </div>
  <script>
    if (!localStorage.getItem("q4")) {
      alert("問4を解いてから進んでください。");
      window.location.href = "q4.html";
    }

    const correctAnswer = "TORA";

    document.getElementById("quizForm").addEventListener("submit", e => {
      e.preventDefault();
      const ans = document.getElementById("answer").value.trim().toUpperCase();
      const result = document.getElementById("result");

      if (ans === correctAnswer) {
        result.textContent = "💖 正解！ついに全ての謎を解いた！";
        localStorage.setItem("q5", "true");
        setTimeout(()=>window.location.href = "congrats.html",1200);
      } else {
        result.textContent = "❌ 不正解です。";
      }
    });
  </script>
</body>
</html>
