name: Build and deploy to Kuroco front
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Build static site
        run: |
          npm install
          npm run build

      - name: Deploy
        # ↓ バージョン指定をより確実に「@v1」から「@master」に変更しました
        uses: Kuroco-front/kuroco-front-action@master
        with:
          token: ${{ secrets.KUROCO_FRONT_TOKEN }}
          repository_id: 24021400564
          output_dir: out
