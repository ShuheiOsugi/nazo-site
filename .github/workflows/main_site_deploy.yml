name: Deploy to Kuroco
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Build
        run: |
          npm install
          npm run build

      - name: Deploy to Kuroco (Direct)
        # ツールを介さず、直接URLにファイルを送りつけます
        run: |
          zip -r output.zip out
          curl -X POST "https://shumunazo.g.kuroco.app/direct/menu/github/" \
            -H "X-Kuroco-Auth: ${{ secrets.KUROCO_FRONT_TOKEN }}" \
            -F "repository_id=24021400564" \
            -F "file=@output.zip"
