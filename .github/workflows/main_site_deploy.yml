name: Deploy to Kuroco
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy to Kuroco (Direct)
        run: |
          # リポジトリにある全HTMLとCSS、JSONをフォルダ階層なしでzipにする
          zip -j output.zip ./*.html ./*.css ./*.json
          
          curl -X POST "https://shumunazo.g.kuroco.app/direct/menu/github/" \
            -H "X-Kuroco-Auth: ${{ secrets.KUROCO_FRONT_TOKEN }}" \
            -F "repository_id=24021400564" \
            -F "file=@output.zip"
