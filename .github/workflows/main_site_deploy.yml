name: Deploy to Kuroco
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Build
        run: |
          npm install
          npm run build

      - name: Execute Kuroco Action
        # 大文字のKから始まる正式パスを再度指定
        uses: Kuroco-front/kuroco-front-action@v1
        with:
          token: ${{ secrets.KUROCO_FRONT_TOKEN }}
          repository_id: 24021400564
          output_dir: out
